<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniBite</title>
    <link rel="icon" type="image/png" href="logotransparent.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
    <div class="logo">
        <img src="logo.jpeg" alt="UniBite Logo">
    </div>
    <div class="top-right">
        <div class="lang-dropdown" id="langDropdown">
            <div class="selected">
                <span>Ελληνικά</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="options">
                <div class="option" data-lang="el">Ελληνικά</div>
                <div class="option" data-lang="en">English</div>
            </div>
        </div>
        <a href="login.html" class="nav-active">Σύνδεση </a>
        <a href="register.html" class="nav-active">Εγγραφή</a>
    </div>
</header>

<div class="container">
    <div class="login-card help-card">
        <h1>Ξέχασες το συνθηματικό σου;</h1>
        <p class="subtitle">Επικοινώνησε μαζί μας για άμεση βοήθεια.</p>

        <div class="contact-info">
            <i class="fas fa-envelope"></i>
            <p><strong>Email:</strong> support@unibite.gr</p>
            <i class="fas fa-phone-alt"></i>
            <p><strong>Τηλέφωνο:</strong> 261 300 6992</p>
            <i class="fab fa-facebook-messenger"></i>
            <p><strong>Messenger:</strong> @UniBiteSupport</p>
        </div>

        <p style="font-size: 14px; text-align: center;">Θα σου απαντήσουμε εντός 24 ωρών.</p>
        <a href="login.html" class="back-link"><i class="fas fa-arrow-left"></i> Επιστροφή στη Σύνδεση</a>
    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
